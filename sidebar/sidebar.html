<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Karakeep Search</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; margin: 0; font-size: 13px; color: #333; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    .empty { color: #666; }

    /* Skeleton loading */
    .skeleton-card { margin-bottom: 14px; }
    .skeleton-line {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 14px;
      margin-bottom: 6px;
    }
    .skeleton-line.title { width: 75%; height: 16px; }
    .skeleton-line.url { width: 90%; height: 12px; }
    .skeleton-line.desc { width: 100%; height: 12px; }
    .skeleton-line.tags { width: 40%; height: 12px; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Result cards */
    .result-card {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eee;
    }
    .result-card:last-child { border-bottom: none; }
    .result-card a {
      color: #1a0dab;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.3;
    }
    .result-card a:hover { text-decoration: underline; }
    .result-url {
      color: #006621;
      font-size: 12px;
      margin: 2px 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-desc {
      color: #555;
      font-size: 12px;
      line-height: 1.4;
      margin: 0 0 4px;
    }
    .result-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: #e8f0fe;
      color: #1967d2;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* Error state */
    .error-state { text-align: center; padding: 16px 0; }
    .error-msg { color: #d93025; margin: 0 0 12px; }
    .retry-btn {
      background: #1967d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #1558b0; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #303134; color: #bdc1c6; }
      h3 { color: #bdc1c6; }
      .empty { color: #9aa0a6; }
      .skeleton-line { background: linear-gradient(90deg, #3c4043 25%, #4a4a4d 50%, #3c4043 75%); background-size: 200% 100%; }
      .result-card { border-bottom-color: #3c4043; }
      .result-card a { color: #8ab4f8; }
      .result-url { color: #bdc1c6; }
      .result-desc { color: #9aa0a6; }
      .tag { background: #394457; color: #8ab4f8; }
      .error-msg { color: #f28b82; }
      .retry-btn { background: #8ab4f8; color: #303134; }
      .retry-btn:hover { background: #aecbfa; }
    }
  </style>
</head>
<body>
  <h3>Karakeep Search</h3>
  <div id="content"><p class="empty">Perform a Google search to see matching bookmarks.</p></div>
  <script src="sidebar.js" type="module"></script>
</body>
</html>
