<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Karakeep Search Options</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; max-width: 400px; }
    label { display: block; margin-top: 12px; font-weight: 600; font-size: 13px; }
    input { width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 16px; padding: 8px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1557b0; }
    #status { margin-top: 12px; font-size: 13px; }
    .success { color: #188038; }
    .error { color: #d93025; }
  </style>
</head>
<body>
  <h2>Karakeep Search</h2>
  <label>Server URL
    <input type="url" id="serverUrl" placeholder="https://karakeep.example.com">
  </label>
  <label>API Key
    <input type="password" id="apiKey" placeholder="Your Karakeep API key">
  </label>
  <button id="save">Save & Test</button>
  <div id="status"></div>

  <script src="options.js" type="module"></script>
</body>
</html>
